{% extends "admin/index.html" %}
{% load i18n %}

{% block content %}
<style>
  .btn-orar,
  .btn-orar:link,
  .btn-orar:visited {
    display: inline-block; padding: 10px 20px;
    background: #1ea0f7; color: #fff !important;
    border-radius: 4px; text-decoration: none; font-size: 15px;
    transition: background .15s;
  }
  .btn-orar:hover { background: #1a6bbf; color: #fff !important; }

  .btn-raport,
  .btn-raport:link,
  .btn-raport:visited {
    display: inline-block; padding: 10px 20px;
    background: #004472; color: #fff !important;
    border-radius: 4px; text-decoration: none; font-size: 15px;
    transition: background .15s;
  }
  .btn-raport:hover { background: #003359; color: #fff !important; }
</style>
<div style="margin-bottom:6px; display:flex; flex-wrap:wrap; gap:10px;">
  <a href="/admin/core/therapy/batch/" class="btn-orar" style="flex:1;text-align:center;">
    &#xFF0B; Editează/Adaugă orar
  </a>
</div>
<div style="margin-bottom:10px; display:flex; flex-wrap:wrap; gap:10px;">
  <a href="/admin/core/rapoarte/lunar/" class="btn-raport" style="flex:1;text-align:center;">
    &#x1F4CA; Raport lunar
  </a>
  <a href="/admin/core/rapoarte/anual/" class="btn-raport" style="flex:1;text-align:center;">
    &#x1F4CB; Raport anual
  </a>
</div>
<div style="margin-bottom:16px; display:flex; flex-wrap:wrap; gap:10px;">
  <a href="/admin/core/rapoarte/saptamanal/" class="btn-raport" style="flex:1;text-align:center;">
    &#x1F5D3; Raport săptămânal
  </a>
  <a href="/admin/core/rapoarte/zilnic/" class="btn-raport" style="flex:1;text-align:center;">
    &#x1F4C5; Raport zilnic
  </a>
</div>
{{ block.super }}
{% endblock %}

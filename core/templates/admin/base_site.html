{% extends "admin/base.html" %}
{% load i18n %}

{% block userlinks %}
  {% if user.has_usable_password %}
    <a href="{% url 'admin:password_change' %}">{% trans 'Schimbă parola' %}</a> /
  {% endif %}
  <form method="post" action="{% url 'admin:logout' %}" style="display:inline;margin:0;padding:0;">
    {% csrf_token %}
    <button type="submit" class="logout-link">{% trans 'DECONECTARE' %}</button>
  </form>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
  /* ── Primary brand colour (#1ea0f7) ── */
  :root {
    --primary: #1ea0f7;
    --secondary: #004472;
    --breadcrumbs-bg: #004472;
    --breadcrumbs-fg: #fff;
    --breadcrumbs-link-fg: #fff;
    --breadcrumbs-link-hover: rgba(255,255,255,.75);
    --link-fg: #1ea0f7;
    --link-hover-fg: #1a6bbf;
    --darkened-bg: #eaf4fd;
  }

  /* Header / nav bar */
  #header { background: #1ea0f7; }
  #header a:link, #header a:visited { color: #fff; }
  div#user-tools a { color: #fff; border-bottom-color: rgba(255,255,255,.5); }
  div#user-tools a:hover { color: #fff; border-bottom-color: #fff; }
  .logout-link {
    background: none; border: none; border-bottom: 1px solid rgba(255,255,255,.5);
    color: #fff; cursor: pointer; font-size: inherit; font-family: inherit;
    font-weight: inherit; padding: 0; margin: 0; text-decoration: none;
  }
  .logout-link:hover { border-bottom-color: #fff; }

  /* Breadcrumbs bar */
  div.breadcrumbs {
    background: #004472;
    color: #fff;
  }
  div.breadcrumbs a { color: #fff; }
  div.breadcrumbs a:hover { color: rgba(255,255,255,.8); }

  /* Buttons */
  .button, input[type=submit], input[type=button],
  .submit-row input, a.button {
    background: #1ea0f7;
    border-color: #1a6bbf;
  }
  .button:hover, input[type=submit]:hover, input[type=button]:hover,
  .submit-row input:hover, a.button:hover {
    background: #1a6bbf;
  }
  .button.default, input[type=submit].default, .submit-row input.default {
    background: #1ea0f7;
    border-color: #1a6bbf;
  }
  .button.default:hover { background: #1a6bbf; }

  /* Module headers (app labels, change-list header) */
  .module h2, .module caption, .inline-group h2 {
    background: #1ea0f7;
    color: #fff;
  }
  .module h2 a, .module h2 a:link, .module h2 a:visited,
  .module caption a, .module caption a:link, .module caption a:visited {
    color: #fff !important;
  }

  /* Active nav sidebar link */
  #nav-sidebar .current-app .section:link,
  #nav-sidebar .current-app .section:visited {
    color: #1ea0f7;
  }
  #nav-sidebar tr.selected { background: #eaf4fd; }

  /* Links */
  a:link, a:visited { color: #1ea0f7; }
  a:hover { color: #1a6bbf; }

  /* Selected checkboxes row highlight */
  tr.selected { background-color: #eaf4fd; }

  /* Paginator active */
  .paginator a:focus, .paginator a:hover { background: #1ea0f7; }
  .paginator .this-page { background: #1ea0f7; }

  /* Reset password button on user change form */
  .password-reset-link,
  .submit-row a.historylink,
  [class*="password"] a.button,
  #content a[href*="password"] {
    background: #1ea0f7 !important;
    color: #fff !important;
    border-color: #1a6bbf !important;
  }
  .password-reset-link:hover,
  .submit-row a.historylink:hover,
  [class*="password"] a.button:hover,
  #content a[href*="password"]:hover {
    background: #1a6bbf !important;
    color: #fff !important;
  }
  /* Target the specific reset-password link rendered by Django UserAdmin */
  .submit-row a.button[href*="password"] {
    background: #1ea0f7 !important;
    color: #fff !important;
    border-color: #1a6bbf !important;
  }
  .submit-row a.button[href*="password"]:hover {
    background: #1a6bbf !important;
  }
  /* Acasă button in sidebar */
  #nav-sidebar .acasa-btn {
    display: block;
    margin: 10px 12px 4px;
    padding: 6px 12px;
    background: #1ea0f7;
    color: #fff !important;
    border-radius: 4px;
    text-decoration: none;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
  }
  #nav-sidebar .acasa-btn:hover { background: #1a6bbf; }
  /* Hide the auto-generated app-section heading links */
  #nav-sidebar .section { display: none; }
</style>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var sidebar = document.getElementById('nav-sidebar');
  if (!sidebar) return;
  // Insert a single "Acasă" button at the very top of the sidebar
  var btn = document.createElement('a');
  btn.href = '/admin/';
  btn.className = 'acasa-btn';
  btn.textContent = 'Acasă';
  sidebar.insertBefore(btn, sidebar.firstChild);
});
</script>
{% endblock %}
